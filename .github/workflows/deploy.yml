name: Deploy Aroda to Namecheap

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: 🔨 Install and Build React
        run: |
          npm install
          npm run build
        working-directory: ./aroda # <--- Tells GitHub to use your REAL folder

      - name: 📂 Sync files to Namecheap
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./aroda/dist/ # <--- Grabs the finished website from your REAL folder
          server-dir: /
